name: Release to PyPI

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated to v6
        with:
          fetch-depth: 0 # Important for setuptools-scm to see tags

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6
        with:
          python-version: '3.x'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip build twine black isort flake8

      - name: Quick style checks
        run: |
          black --check . || true
          isort --check-only . || true
          flake8 || true

      - name: Build distributions
        run: |
          python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true # Added this to reveal the 400 error details