name: Build and upload documentation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Upgrade pip / tooling
        run: python -m pip install --upgrade pip setuptools wheel
        working-directory: alexandria

      - name: Install project and docs dependencies
        run: python -m pip install .[docs]
        working-directory: alexandria

      - name: Build Sphinx HTML
        run: python -m sphinx -b html src/alexandria/docs/source src/alexandria/docs/_build/html
        working-directory: alexandria
        - name: Install docs requirements
          run: |
            python -m pip install --upgrade pip
            python -m pip install alexandria/.[docs]

        - name: Build Sphinx HTML
          run: |
            python -m sphinx -b html docs/source docs/_build/html

      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: src/alexandria/docs/_build/html
